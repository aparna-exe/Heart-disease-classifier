<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BayesMed | Diagnostic Tool</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #38bdf8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2.5rem; border-radius: 1rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); border: 1px solid #334155; max-width: 400px; text-align: center; }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 1rem; }
        p { line-height: 1.6; color: #94a3b8; margin-bottom: 2rem; }
        .btn { background: var(--primary); color: #0f172a; padding: 0.75rem 1.5rem; text-decoration: none; border-radius: 0.5rem; font-weight: 700; transition: transform 0.2s; display: inline-block; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Medical Diagnostic Project</h1>
        <p>A Python-powered engine using Bayes Theorem to calculate posterior probabilities for heart disease risk assessment.</p>
        <a href="https://github.com/aparna-exe/Heart-disease-classifier/" class="btn">View Source Code</a>
    </div>
</body>
</html>
